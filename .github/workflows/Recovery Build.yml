name: OrangeFox Android 9 Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'Base Android 9 manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git'
      MANIFEST_BRANCH:
        description: 'Base Android 9 manifest branch'
        required: true
        default: 'twrp-9.0'
      DEVICE_TREE_URL:
        description: 'Device tree URL. Leave blank to use DEVICE_PATH from this repository.'
        required: false
        default: ''
      DEVICE_TREE_BRANCH:
        description: 'Device tree branch'
        required: false
        default: 'main'
      DEVICE_PATH:
        description: 'Device tree path inside Android source'
        required: true
        default: 'device/ecarx/IHU519G'
      COMMON_TREE_URL:
        description: 'Common tree URL. Leave blank if not used.'
        required: false
        default: ''
      COMMON_TREE_BRANCH:
        description: 'Common tree branch. Leave blank to use DEVICE_TREE_BRANCH.'
        required: false
        default: ''
      COMMON_PATH:
        description: 'Common tree path inside Android source. Leave blank if not used.'
        required: false
        default: ''
      DEVICE_NAME:
        description: 'Output product directory name'
        required: true
        default: 'IHU519G'
      MAKEFILE_NAME:
        description: 'Lunch product name without build variant'
        required: true
        default: 'omni_IHU519G'
      BUILD_TARGET:
        description: 'Build target: recovery, boot, or vendorboot'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
      options: --user root
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Initialize workspace
        id: pwd
        run: |
          mkdir -p "$GITHUB_WORKSPACE/workspace"
          echo "workspace-folder=$GITHUB_WORKSPACE/workspace" >> "$GITHUB_OUTPUT"

      - name: Prepare Android build environment
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y software-properties-common ca-certificates sudo
          add-apt-repository -y universe
          apt-get update
          apt-get install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig rsync bc ccache \
            tar xz-utils file \
            aria2 python2 python-is-python2
          git clone https://gitlab.com/OrangeFox/misc/scripts
          bash scripts/setup/android_build_env.sh
          mkdir -p "$HOME/.bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/.bin/repo"
          chmod a+x "$HOME/.bin/repo"
          echo "$HOME/.bin" >> "$GITHUB_PATH"
        working-directory: ${{ github.workspace }}

      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Install OpenJDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Setup SSH keys
        if: ${{ startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') || startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync Android 9 recovery base
        run: |
          export PATH="$HOME/.bin:$PATH"
          mkdir -p "${{ steps.pwd.outputs.workspace-folder }}/fox_9"
          cd "${{ steps.pwd.outputs.workspace-folder }}/fox_9"
          repo init --depth=1 -u "${{ github.event.inputs.MANIFEST_URL }}" -b "${{ github.event.inputs.MANIFEST_BRANCH }}"
          repo sync --no-repo-verify -c --no-tags --no-clone-bundle --optimized-fetch --prune -j"$(nproc --all)"
        working-directory: ${{ github.workspace }}

      - name: Add OrangeFox sources
        run: |
          set -e
          cd "${{ steps.pwd.outputs.workspace-folder }}/fox_9"

          rm -rf bootable/recovery vendor/recovery
          git clone --depth=1 --branch R9.0 \
            https://gitlab.com/OrangeFox/bootable/Recovery.git bootable/recovery || \
          git clone --depth=1 --branch fox_9.0 \
            https://gitlab.com/OrangeFox/bootable/Recovery.git bootable/recovery

          if git ls-remote --exit-code --tags https://gitlab.com/OrangeFox/vendor/recovery.git R9.0 >/dev/null 2>&1; then
            git clone --depth=1 --branch R9.0 \
              https://gitlab.com/OrangeFox/vendor/recovery.git vendor/recovery
          elif git ls-remote --exit-code --heads https://gitlab.com/OrangeFox/vendor/recovery.git fox_9.0 >/dev/null 2>&1; then
            git clone --depth=1 --branch fox_9.0 \
              https://gitlab.com/OrangeFox/vendor/recovery.git vendor/recovery
          else
            git clone --depth=1 https://gitlab.com/OrangeFox/vendor/recovery.git vendor/recovery
          fi

          echo "Available recovery themes:"
          find bootable/recovery vendor/recovery -path '*/ui.xml' -print | sort
        working-directory: ${{ github.workspace }}

      - name: Patch legacy recovery make compatibility
        run: |
          set -e
          cd "${{ steps.pwd.outputs.workspace-folder }}/fox_9"

          # Legacy TWRP/OrangeFox Android.mk files use LOCAL_ADDITIONAL_DEPENDENCIES
          # for module names. Android 9 build/make treats that as fatal, so keep it
          # as a warning for this recovery-only build.
          sed -i \
            's/$(call pretty-error,"LOCAL_ADDITIONAL_DEPENDENCIES must only contain paths (not module names)")/$(call pretty-warning,"LOCAL_ADDITIONAL_DEPENDENCIES contains module names; allowed for legacy TWRP\/OrangeFox recovery makefiles")/' \
            build/make/core/base_rules.mk

          grep -n "LOCAL_ADDITIONAL_DEPENDENCIES" build/make/core/base_rules.mk | head -20

          # Newer clang treats this legacy minuitwrp signedness warning as fatal
          # because recovery is built with -Werror.
          sed -i \
            's/idx < (gr_draw->height \* gr_draw->row_bytes)/idx < static_cast<unsigned int>(gr_draw->height * gr_draw->row_bytes)/' \
            bootable/recovery/minuitwrp/graphics_fbdev.cpp
          grep -n "idx <" bootable/recovery/minuitwrp/graphics_fbdev.cpp | head -5

        working-directory: ${{ github.workspace }}

      - name: Add device tree
        run: |
          set -e
          SRC="${GITHUB_WORKSPACE}/${{ github.event.inputs.DEVICE_PATH }}"
          DST="${{ steps.pwd.outputs.workspace-folder }}/fox_9/${{ github.event.inputs.DEVICE_PATH }}"
          mkdir -p "$(dirname "$DST")"
          if [ -n "${{ github.event.inputs.DEVICE_TREE_URL }}" ]; then
            git clone --depth=1 --single-branch -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" \
              "${{ github.event.inputs.DEVICE_TREE_URL }}" "$DST"
          elif [ -d "$SRC" ]; then
            cp -a "$SRC" "$DST"
          else
            echo "No DEVICE_TREE_URL was provided, and $SRC does not exist."
            echo "Either push the device tree into this repository at DEVICE_PATH, or provide DEVICE_TREE_URL."
            exit 1
          fi

      - name: Add common tree
        if: ${{ github.event.inputs.COMMON_TREE_URL != '' && github.event.inputs.COMMON_PATH != '' }}
        run: |
          set -e
          BRANCH="${{ github.event.inputs.COMMON_TREE_BRANCH }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
          fi
          DST="${{ steps.pwd.outputs.workspace-folder }}/fox_9/${{ github.event.inputs.COMMON_PATH }}"
          mkdir -p "$(dirname "$DST")"
          git clone --depth=1 --single-branch -b "$BRANCH" \
            "${{ github.event.inputs.COMMON_TREE_URL }}" "$DST"

      - name: Build recovery
        run: |
          set -e
          cd "${{ steps.pwd.outputs.workspace-folder }}/fox_9"
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch "${{ github.event.inputs.MAKEFILE_NAME }}-eng"
          make clean
          mka adbd "${{ github.event.inputs.BUILD_TARGET }}image" -j"$(nproc --all)"
        working-directory: ${{ github.workspace }}

      - name: Check output directory
        run: |
          ls -al "${{ steps.pwd.outputs.workspace-folder }}/fox_9/out/target/product/"
          echo
          ls -al "${{ steps.pwd.outputs.workspace-folder }}/fox_9/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pwd.outputs.workspace-folder }}/fox_9/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
            ${{ steps.pwd.outputs.workspace-folder }}/fox_9/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
          name: ${{ github.event.inputs.DEVICE_NAME }}-android9-${{ github.run_id }}
          tag_name: android9-${{ github.run_id }}
          body: |
            Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
            Device: ${{ github.event.inputs.DEVICE_NAME }}
            Target: ${{ github.event.inputs.BUILD_TARGET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
